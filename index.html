<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget Checker</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #1b2a2f;
      color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #app {
      background: #2f4f4f;
      padding: 25px;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.5);
      text-align: center;
    }

    #icon {
      width: 60px;
      height: 60px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    h2 {
      margin: 0;
      color: #76c7c0; 
    }

    h1 {
      margin-top: 10px;
      color: #a8e6cf; 
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
      background: #3c5a5a;
      color: #f0f0f0;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: #76c7c0;
      color: #1b2a2f;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #5aa9a4; 
    }

    ul {
      margin-top: 15px;
      padding: 0;
      list-style: none;
    }

    li {
      background: #3c5a5a;
      padding: 10px;
      margin-top: 6px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <div id="app">

    <h2>Budget Checker</h2>
    <h1 id="bal">0</h1>

    <input type="text" id="desc" placeholder="Item">
    <input type="number" id="amt" placeholder="Amount">
    <button onclick="add()">Add</button>

    <ul id="list"></ul>
  </div>

<script>
  let total = 0;
  const b = document.getElementById('bal');
  const d = document.getElementById('desc');
  const a = document.getElementById('amt');
  const l = document.getElementById('list');

  function add() {
    let v = parseFloat(a.value);
    let n = d.value;

    if (n && v) {
      total += v;
      b.innerText = total;

      localStorage.setItem("item", n);
      localStorage.setItem("amount", total);
      const get_item = localStorage.getItem("item");
      const get_amount = localStorage.getItem("amount");

      let i = document.createElement('li');
      i.innerText = get_item + ": " + get_amount;
      l.appendChild(i);

      d.value = '';
      a.value = '';
    }
  }

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
      .then(() => console.log("Service Worker registered"))
      .catch(error => console.log("Service Worker registration failed:", error));
  }
</script>

</body>
</html>
